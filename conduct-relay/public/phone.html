<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Conductor — Phone</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #e9e9e9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 24px;
        box-sizing: border-box;
        gap: 16px;
      }
      h2 {
        margin: 0;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      button {
        font-size: 18px;
        padding: 18px 24px;
        border: 0;
        border-radius: 10px;
        background: #2a6df4;
        color: white;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: background 120ms ease;
      }
      button:disabled {
        background: #1a1a1a;
        color: #555;
      }
      button.secondary {
        background: #2a2a2a;
        color: #e9e9e9;
      }
      button.flash {
        background: #6cf48a !important;
        color: #0a0a0a !important;
      }
      #status {
        opacity: 0.7;
        font-size: 14px;
      }
      #data {
        margin-top: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h2>Conductor · Phone</h2>
      <div class="row">
        <label for="session">session</label>
        <input id="session" type="text" placeholder="8 chars (or use URL ?s=)" maxlength="8" autocapitalize="characters" />
        <button id="start">Start</button>
        <button id="calibrate" class="secondary" disabled>Calibrate (Zero)</button>
      </div>
      <div id="status">Tap Start to begin.</div>
      <div id="data"></div>
    </div>
    <script src="/phone.bundle.js"></script>
  </body>
</html>
