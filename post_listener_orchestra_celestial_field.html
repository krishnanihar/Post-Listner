<script>
(function(){
  const SW=680,SH=600,dpr=window.devicePixelRatio||1;
  let root,bg,fg,trail,bCtx,fCtx,tCtx;
  let cw=0,ch=0,sc=1,ox=0,oy=0;
  let cur={x:SW*0.62,y:SH*0.5},sm={x:SW*0.62,y:SH*0.5};
  let lastAct=0;
  const trace=[];
  const INK=[38,22,14],INK_WET=[18,10,5],GLOW=[198,148,82];
  const TRACE_LIFE=3800;
  const W_MIN=1.2,W_MAX=14,V_SAT=620;
  const stars=[];
  const inscribed=[];
  let lastActStar=null;
  const LINE_LIFE=9000;

  const starPositions=[
    [60,68],[110,105],[160,80],[55,160],[120,180],[78,220],
    [575,75],[620,110],[580,165],[635,195],[600,240],
    [50,290],[95,340],[42,395],[85,440],
    [625,295],[582,345],[638,395],[598,442],
    [60,490],[110,520],[45,560],
    [610,490],[570,525],[635,560],
    [280,40],[395,45],[340,18],
    [305,575],[378,580]
  ];
  for(const [x,y] of starPositions){
    stars.push({
      x:x+(Math.random()-0.5)*6,
      y:y+(Math.random()-0.5)*6,
      base:0.22+Math.random()*0.20,
      r:0.7+Math.random()*1.6,
      act:0
    });
  }
  const bright=[1,5,8,11,17,20,26];
  for(const i of bright){if(stars[i]){stars[i].r*=1.7;stars[i].base+=0.18;}}

  const hintConstellations=[
    [[60,68],[110,105],[160,80],[120,180]],
    [[575,75],[620,110],[580,165]],
    [[60,490],[110,520],[45,560]],
    [[625,295],[582,345],[638,395]]
  ];

  function wid(v){
    const n=Math.min(1,v/V_SAT);
    const e=Math.pow(n,0.55);
    return W_MAX-(W_MAX-W_MIN)*e;
  }

  function applyT(ctx){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr,dpr);
    ctx.translate(ox,oy);
    ctx.scale(sc,sc);
  }

  function drawBg(){
    bCtx.save();bCtx.setTransform(1,0,0,1,0,0);
    bCtx.clearRect(0,0,bg.width,bg.height);
    bCtx.restore();applyT(bCtx);
    const g=bCtx.createRadialGradient(SW/2,SH/2,80,SW/2,SH/2,500);
    g.addColorStop(0,'#e8d8b3');g.addColorStop(0.6,'#dac6a0');g.addColorStop(1,'#c2ad84');
    bCtx.fillStyle=g;bCtx.fillRect(0,0,SW,SH);
    bCtx.strokeStyle='rgba(80,52,28,0.08)';bCtx.lineWidth=0.5;
    bCtx.beginPath();bCtx.arc(SW/2,SH/2+10,290,0,Math.PI*2);bCtx.stroke();
    bCtx.beginPath();bCtx.arc(SW/2,SH/2+10,240,0,Math.PI*2);bCtx.stroke();
    bCtx.save();bCtx.setLineDash([3,5]);
    bCtx.strokeStyle='rgba(80,52,28,0.06)';
    bCtx.beginPath();bCtx.arc(SW/2,SH/2+10,330,0,Math.PI*2);bCtx.stroke();
    bCtx.restore();
    bCtx.strokeStyle='rgba(70,46,24,0.18)';bCtx.lineWidth=0.55;
    for(const c of hintConstellations){
      bCtx.beginPath();bCtx.moveTo(c[0][0],c[0][1]);
      for(let i=1;i<c.length;i++)bCtx.lineTo(c[i][0],c[i][1]);
      bCtx.stroke();
    }
    bCtx.fillStyle='rgba(50,32,16,0.06)';
    for(let i=0;i<300;i++){bCtx.fillRect(Math.random()*SW,Math.random()*SH,1,1);}
    bCtx.font='italic 18px Georgia, serif';
    bCtx.fillStyle='rgba(80,52,28,0.42)';
    bCtx.fillText('☉',22,38);
    bCtx.fillText('☽',640,38);
    bCtx.fillText('♃',22,580);
    bCtx.fillText('♄',640,580);
    bCtx.font='italic 14px Georgia, serif';
    bCtx.fillStyle='rgba(80,52,28,0.32)';
    bCtx.fillText('♂',24,310);
    bCtx.fillText('♀',640,310);
    bCtx.font='italic 11px Georgia, serif';
    bCtx.fillStyle='rgba(80,52,28,0.22)';
    bCtx.fillText('aries',38,260);
    bCtx.fillText('libra',610,360);
  }

  function resize(){
    const r=root.getBoundingClientRect();
    if(r.width<10||r.height<10)return;
    cw=r.width;ch=r.height;
    sc=Math.min(cw/SW,ch/SH);
    ox=(cw-SW*sc)/2;
    oy=(ch-SH*sc)/2;
    for(const c of [bg,fg,trail]){
      c.width=Math.round(cw*dpr);
      c.height=Math.round(ch*dpr);
    }
    bCtx=bg.getContext('2d');
    fCtx=fg.getContext('2d');
    tCtx=trail.getContext('2d');
    applyT(bCtx);applyT(fCtx);applyT(tCtx);
    drawBg();
  }

  function update(dt,t){
    if(performance.now()-lastAct>1500){
      const tt=t*0.42;
      cur.x=SW*0.5+Math.sin(tt)*SW*0.34;
      cur.y=SH*0.5+Math.sin(tt*1.8)*SH*0.28;
    }
    sm.x+=(cur.x-sm.x)*0.22;
    sm.y+=(cur.y-sm.y)*0.22;
    const now=performance.now();
    const last=trace[trace.length-1];
    let vel=0;
    if(last){
      const dx=sm.x-last.x,dy=sm.y-last.y;
      const dist=Math.hypot(dx,dy);
      const tdt=Math.max(0.001,(now-last.t)/1000);
      vel=dist/tdt;
    }
    if(!last||Math.hypot(sm.x-last.x,sm.y-last.y)>0.9){
      trace.push({x:sm.x,y:sm.y,t:now,v:vel});
    }
    while(trace.length&&now-trace[0].t>TRACE_LIFE){trace.shift();}
    if(trace.length>240)trace.splice(0,trace.length-240);

    for(const s of stars){
      const d=Math.hypot(s.x-sm.x,s.y-sm.y);
      if(d<32){
        if(s.act<0.4&&lastActStar!==s){
          if(lastActStar){
            const d2=Math.hypot(s.x-lastActStar.x,s.y-lastActStar.y);
            if(d2<240){
              inscribed.push({x1:lastActStar.x,y1:lastActStar.y,x2:s.x,y2:s.y,t:now});
            }
          }
          lastActStar=s;
        }
        s.act=Math.min(1,s.act+dt*5);
      }
      s.act=Math.max(0,s.act-dt*0.55);
    }
    while(inscribed.length&&now-inscribed[0].t>LINE_LIFE){inscribed.shift();}
    if(inscribed.length>60)inscribed.splice(0,inscribed.length-60);
  }

  function buildRibbon(){
    const n=trace.length;
    if(n<2)return false;
    for(let i=0;i<n;i++){trace[i].hwRaw=wid(trace[i].v)/2;}
    for(let i=0;i<n;i++){
      let s=0,c=0;
      for(let j=Math.max(0,i-2);j<=Math.min(n-1,i+2);j++){s+=trace[j].hwRaw;c++;}
      trace[i].hw=s/c;
    }
    for(let i=0;i<n;i++){
      let tx,ty;
      if(i===0){tx=trace[1].x-trace[0].x;ty=trace[1].y-trace[0].y;}
      else if(i===n-1){tx=trace[n-1].x-trace[n-2].x;ty=trace[n-1].y-trace[n-2].y;}
      else{tx=trace[i+1].x-trace[i-1].x;ty=trace[i+1].y-trace[i-1].y;}
      const L=Math.hypot(tx,ty)||1;
      trace[i].nx=-ty/L;trace[i].ny=tx/L;
    }
    if(n>4){for(let k=0;k<Math.min(4,n);k++){
      const tail=Math.min(1,k/3);
      trace[k].hw*=0.35+0.65*tail;
    }}
    return true;
  }

  function drawFg(){
    fCtx.save();fCtx.setTransform(1,0,0,1,0,0);
    fCtx.clearRect(0,0,fg.width,fg.height);
    fCtx.restore();applyT(fCtx);
    const now=performance.now();
    for(const ln of inscribed){
      const age=now-ln.t;
      const lf=1-age/LINE_LIFE;
      if(lf<=0)continue;
      fCtx.strokeStyle=`rgba(60,38,20,${lf*0.55})`;
      fCtx.lineWidth=0.8;
      fCtx.beginPath();
      fCtx.moveTo(ln.x1,ln.y1);
      fCtx.lineTo(ln.x2,ln.y2);
      fCtx.stroke();
    }
    for(const s of stars){
      const br=s.base+s.act*0.65;
      const sz=s.r*(1+s.act*0.45);
      if(s.act>0.08){
        fCtx.fillStyle=`rgba(${GLOW[0]},${GLOW[1]},${GLOW[2]},${s.act*0.32})`;
        fCtx.beginPath();fCtx.arc(s.x,s.y,sz*5,0,Math.PI*2);fCtx.fill();
      }
      fCtx.fillStyle=`rgba(45,28,15,${br})`;
      fCtx.beginPath();fCtx.arc(s.x,s.y,sz,0,Math.PI*2);fCtx.fill();
      if(s.act>0.3){
        fCtx.fillStyle=`rgba(245,210,150,${s.act*0.85})`;
        fCtx.beginPath();fCtx.arc(s.x,s.y,sz*0.5,0,Math.PI*2);fCtx.fill();
      }
    }
  }

  function drawTrail(){
    tCtx.save();tCtx.setTransform(1,0,0,1,0,0);
    tCtx.clearRect(0,0,trail.width,trail.height);
    tCtx.restore();applyT(tCtx);
    if(!buildRibbon())return;
    const now=performance.now();
    for(let i=0;i<trace.length-1;i++){
      const p0=trace[i],p1=trace[i+1];
      const age=now-(p0.t+p1.t)/2;
      const lf=1-age/TRACE_LIFE;
      if(lf<=0)continue;
      const hw0=p0.hw*2.6,hw1=p1.hw*2.6;
      tCtx.fillStyle=`rgba(${GLOW[0]},${GLOW[1]},${GLOW[2]},${lf*0.16})`;
      tCtx.beginPath();
      tCtx.moveTo(p0.x+p0.nx*hw0,p0.y+p0.ny*hw0);
      tCtx.lineTo(p1.x+p1.nx*hw1,p1.y+p1.ny*hw1);
      tCtx.lineTo(p1.x-p1.nx*hw1,p1.y-p1.ny*hw1);
      tCtx.lineTo(p0.x-p0.nx*hw0,p0.y-p0.ny*hw0);
      tCtx.closePath();tCtx.fill();
    }
    for(let i=0;i<trace.length-1;i++){
      const p0=trace[i],p1=trace[i+1];
      const age=now-(p0.t+p1.t)/2;
      const lf=1-age/TRACE_LIFE;
      if(lf<=0)continue;
      const wet=Math.max(0,1-age/450);
      const r=INK[0]*(1-wet)+INK_WET[0]*wet;
      const g=INK[1]*(1-wet)+INK_WET[1]*wet;
      const b=INK[2]*(1-wet)+INK_WET[2]*wet;
      const a=lf*(0.62+wet*0.28);
      tCtx.fillStyle=`rgba(${r|0},${g|0},${b|0},${a})`;
      tCtx.beginPath();
      tCtx.moveTo(p0.x+p0.nx*p0.hw,p0.y+p0.ny*p0.hw);
      tCtx.lineTo(p1.x+p1.nx*p1.hw,p1.y+p1.ny*p1.hw);
      tCtx.lineTo(p1.x-p1.nx*p1.hw,p1.y-p1.ny*p1.hw);
      tCtx.lineTo(p0.x-p0.nx*p0.hw,p0.y-p0.ny*p0.hw);
      tCtx.closePath();tCtx.fill();
    }
    if(trace.length>=2){
      const tip=trace[trace.length-1];
      tCtx.fillStyle=`rgba(${INK_WET[0]},${INK_WET[1]},${INK_WET[2]},0.92)`;
      tCtx.beginPath();tCtx.arc(tip.x,tip.y,Math.max(1.5,tip.hw*0.55),0,Math.PI*2);tCtx.fill();
      tCtx.fillStyle=`rgba(${GLOW[0]},${GLOW[1]},${GLOW[2]},0.28)`;
      tCtx.beginPath();tCtx.arc(tip.x,tip.y,tip.hw*2.2,0,Math.PI*2);tCtx.fill();
    }
  }

  function init(){
    root=document.getElementById('pl-root');
    bg=document.getElementById('pl-bg');
    fg=document.getElementById('pl-fg');
    trail=document.getElementById('pl-trail');
    bCtx=bg.getContext('2d');
    fCtx=fg.getContext('2d');
    tCtx=trail.getContext('2d');
    new ResizeObserver(resize).observe(root);
    resize();
    trail.addEventListener('pointermove',e=>{
      const r=trail.getBoundingClientRect();
      cur.x=(e.clientX-r.left-ox)/sc;
      cur.y=(e.clientY-r.top-oy)/sc;
      lastAct=performance.now();
    });
    let lt=performance.now();
    function frame(){
      const now=performance.now();
      const dt=Math.min(0.05,(now-lt)/1000);
      lt=now;
      const t=now/1000;
      update(dt,t);
      drawFg();
      drawTrail();
      requestAnimationFrame(frame);
    }
    frame();
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
